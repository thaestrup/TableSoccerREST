# --- HTTP ---
quarkus.http.port=5051
quarkus.http.host=0.0.0.0
# Access log: enabled in dev so 4xx/5xx investigations don't need a restart.
%dev.quarkus.http.access-log.enabled=true
%dev.quarkus.http.access-log.pattern=%h "%r" %s %b %D

# --- CORS ---
# Default covers this project's Vite port (:4200, per FoosballUnity/vite.config.ts)
# and Vite's stock default (:5173). Override via ALLOWED_ORIGINS in prod.
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,content-type,origin,x-requested-with
quarkus.http.cors.exposed-headers=
quarkus.http.cors.access-control-max-age=24H

# --- Datasource ---
quarkus.datasource.db-kind=mariadb
quarkus.datasource.username=${DB_USER:football}
quarkus.datasource.password=${DB_PASSWORD:football}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:mariadb://localhost:3306/nykreditfoosballunity?useSsl=false}

# --- Hibernate ---
# `validate` ensures the runtime schema matches the entities; Flyway owns DDL.
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false
# JDBC session timezone — aligned with the JVM default (set via TZ in the
# Dockerfiles). Change both together if the service moves out of Copenhagen.
quarkus.hibernate-orm.jdbc.timezone=Europe/Copenhagen

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

# --- OpenAPI / Swagger ---
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# --- Health ---
quarkus.smallrye-health.root-path=/q/health

# --- Dev profile: Testcontainers / Dev Services ---
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.datasource.devservices.image-name=mariadb:10.11
%dev.quarkus.hibernate-orm.log.sql=true

# --- Test profile ---
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.image-name=mariadb:10.11

# --- Native build hints ---
quarkus.native.container-build=true
quarkus.native.container-runtime=podman
quarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-21
# Bake the Copenhagen zone data into the native image. By default Mandrel
# only embeds UTC + the build-host's default zone; production containers
# don't ship tzdata, so the runtime would fall back to UTC otherwise.
quarkus.native.additional-build-args=-H:IncludeTimeZones=Europe/Copenhagen
